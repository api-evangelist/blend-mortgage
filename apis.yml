aid: blend-mortgage
url: https://raw.githubusercontent.com/api-evangelist/blend-mortgage/refs/heads/main/apis.yml
name: Blend
kind: company
description: Blend (Blend Labs) is a cloud digital-lending and account-opening platform
  for banks, credit unions, and mortgage lenders. Its Builder platform powers
  consumer-facing origination for mortgage (home lending), consumer lending (home
  equity, personal loans, credit cards, auto), and deposit account opening. The Blend
  Public API is a documented REST surface (developers.blend.com) that lets lenders and
  their technology partners create and manage lending applications, borrowers/parties,
  documents and disclosures, pricing, closings and eSignature packages, follow-ups
  (tasks), assignments, and webhook event notifications, and to export industry-standard
  loan files (Fannie Mae 3.2, MISMO 3.3.1/3.4) into a loan origination system (LOS).
  API access is credential-gated - tokens are issued to Blend customers and certified
  integration partners rather than through open self-service signup.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Digital Lending
- Mortgage
- Consumer Lending
- Account Opening
- FinTech
- Loan Origination
- Banking
- Financial Services
