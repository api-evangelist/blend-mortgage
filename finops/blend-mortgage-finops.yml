- Mortgage
- Consumer Lending
- FinTech
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Blend spend. Blend is an enterprise lending platform billed under a
  negotiated agreement rather than a public usage meter, so cost visibility comes from
  the contract's structure - a platform subscription combined, in parts of the mortgage
  business, with per-loan / per-application / per-funded-loan transaction economics, plus
  add-ons (income and asset verification, close/eSignature/RON). The Public API itself is
  not separately metered; it is an entitlement of the customer or certified-partner
  relationship. The dominant cost drivers are application/loan volume and product mix.
notes: >-
  Blend does not publish rates; per-unit economics are not reconciled here. Track spend
  against the negotiated agreement and map it to loan/application volume and the enabled
  product lines. Verify current commercial terms with Blend sales.
sources:
- https://blend.com/
- https://developers.blend.com/blend
- https://developers.blend.com/blend/docs/blend-api-quick-start-guide
