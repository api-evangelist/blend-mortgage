sources:
  - url: https://developers.blend.com/blend
    type: Documentation
    note: Blend API docs home; current version v12.0.0; OpenAPI download and llms.txt endpoint index referenced.
  - url: https://developers.blend.com/blend/docs/blend-api-quick-start-guide
    type: Documentation
    note: Quick Start Guide; authorization Bearer token, blend-api-version, and blend-target-instance (tenant~instance) headers.
  - url: https://developers.blend.com/blend/docs/api-auth-security-details
    type: Documentation
    note: Authentication and authorization; 80-byte base64 API Secret Keys exchanged for short-lived request-scoped JWTs at the API Gateway; IP allowlisting and rate limiting; all REST. No WebSocket mentioned.
  - url: https://developers.blend.com/blend/docs/create-a-new-home-loan
    type: Documentation
    note: Create a home lending application (POST /home-lending/applications); parties, lenders, assignees.
  - url: https://developers.blend.com/blend/docs/export-a-home-loan
    type: Documentation
    note: Export the loan file (Fannie Mae 3.2, MISMO 3.3.1/3.4) and manage export statuses.
  - url: https://developers.blend.com/blend/docs/los-guide-how-to-integrate-with-blend
    type: Documentation
    note: LOS integration guide; webhook event notifications (Application Submitted, Documents Submitted, etc.).
  - url: https://blend.com/blog/blend-momentum/autopilot-update-ai-infrastructure-mcp-server-ships-opening-full-lending-platform-ai-agents/
    type: Announcement
    note: Blend MCP server opening the lending platform to AI agents; least-privilege Lending API credentials; beta enablement.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Blend's own public API is
    request/response REST, and its asynchronous mechanism is standard HTTP
    webhooks plus a pollable/acknowledgeable REST events surface. No AsyncAPI
    document was created because there is no server-push transport (WebSocket or
    SSE) on Blend's own API to model. The apis.yml documents ten logical REST
    APIs modeled from Blend's public documentation; access remains credential-gated
    to Blend customers and certified partners.
